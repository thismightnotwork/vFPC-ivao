<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IVAO Route/FL Checker</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; padding:0; }
    header { padding:10px 20px; background:#222; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    input, button { font-size:14px; padding:5px 8px; }
    button { cursor:pointer; }
    #status { margin-left:10px; font-size:13px; }
    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
    th, td { border:1px solid #444; padding:4px 6px; text-align:left; }
    th { background:#333; position:sticky; top:0; }
    tr.red { background:#5a1111; }
    tr.orange { background:#5a3c11; }
    tr.green { background:#114d11; }
    tr:nth-child(even) { opacity:0.95; }
    .small { font-size:11px; color:#aaa; }
    .group { display:flex; align-items:center; gap:6px; }
    .label { font-size:13px; }

    #hintOverlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
    }
    #hintBox {
      background:#222;
      border:1px solid #555;
      padding:12px 16px;
      max-width:480px;
      color:#eee;
      box-shadow:0 0 10px #000;
      white-space:pre-wrap;
    }
    #hintBox h3 {
      margin:0 0 6px 0;
      font-size:15px;
    }
    #hintBox p {
      margin:4px 0;
      font-size:13px;
    }
    #hintClose {
      margin-top:8px;
      padding:4px 8px;
      font-size:13px;
    }
  </style>
</head>
<body>
<header>
  <div class="group">
    <span class=\"label\">IVAO VFPC-style Checker</span>
  </div>

  <div class="group">
    <span class="label">CID:</span>
    <input id="cidInput" type="number" min="1" style="width:90px">
  </div>

  <div class="group">
    <span class="label">or ICAO:</span>
    <input id="icaoInput" type="text" maxlength="4" style="width:70px" placeholder="EGKK">
  </div>

  <button id="fetchBtn">Check</button>
  <span id="status"></span>
</header>

<div style="padding:10px;">
  <div class="small">
    Uses IVAO Whazzup JSON to check departures. Applies E/W vs N/S rules and validates against SRD data.
  </div>

  <table id="resultsTable">
    <thead>
    <tr>
      <th>Callsign</th>
      <th>Dep</th>
      <th>Dest</th>
      <th>Route</th>
      <th>FPL FL</th>
      <th>Track</th>
      <th>Status</th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="hintOverlay">
  <div id="hintBox">
    <h3 id="hintTitle">Hint</h3>
    <p id="hintMain"></p>
    <p id="hintDetails"></p>
    <button id="hintClose">Close</button>
  </div>
</div>

<script>
const WHAZZUP_URL = "https://api.ivao.aero/v2/tracker/whazzup";
const AIRPORTS_URL = "data/airports.json";

let SRD_DATA = {};

async function loadSrd() {
  try {
    const res = await fetch(AIRPORTS_URL);
    SRD_DATA = await res.json();
  } catch (e) {
    console.error("Failed to load SRD data", e);
  }
}

const NS_PREFIXES = ["LI","LF","LP","LE","NZ"];

function usesNorthSouthRule(icao) {
  if (!icao) return false;
  const up = icao.toUpperCase();
  return NS_PREFIXES.some(pref => up.startsWith(pref));
}

document.getElementById('fetchBtn').addEventListener('click', () => {
  const cid = document.getElementById('cidInput').value.trim();
  const icao = document.getElementById('icaoInput').value.trim().toUpperCase();
  if (!cid && !icao) {
    setStatus("Enter a CID or an ICAO.");
    return;
  }
  runCheck(cid || null, icao || null);
});

document.getElementById('hintClose').addEventListener('click', () => {
  document.getElementById('hintOverlay').style.display = "none";
});

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

async function runCheck(cid, manualIcao) {
  setStatus("Fetching Whazzup...");
  clearTable();
  if (Object.keys(SRD_DATA).length === 0) await loadSrd();

  try {
    const res = await fetch(WHAZZUP_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    let airport = null;

    if (manualIcao) {
      airport = manualIcao.toUpperCase();
    } else if (cid) {
      const atc = findAtcForCid(data, cid);
      if (!atc) {
        setStatus("No ATC found for CID " + cid + ".");
        return;
      }
      airport = deriveAirportFromCallsign(atc.callsign);
    }

    if (!airport) {
      setStatus("Could not identify airport.");
      return;
    }

    const departures = findDeparturesFromAirport(data, airport);
    if (!departures.length) {
      setStatus("No current departures from " + airport + ".");
      return;
    }

    const nsRule = usesNorthSouthRule(airport);
    fillTable(airport, departures, nsRule);
    setStatus("Found " + departures.length + " departures from " + airport + (nsRule ? " (N/S)" : " (E/W)"));
  } catch (e) {
    console.error(e);
    setStatus("Error: " + e.message);
  }
}

function clearTable() {
  const tbody = document.querySelector('#resultsTable tbody');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
}

function findAtcForCid(data, cid) {
  const atcs = (data.clients && data.clients.atcs) || [];
  const numCid = Number(cid);
  return atcs.find(a => a.userId === numCid) || null;
}

function deriveAirportFromCallsign(callsign) {
  if (!callsign) return null;
  const parts = callsign.toUpperCase().split("_");
  if (parts[0].length >= 4) return parts[0].substring(0, 4);
  return null;
}

function findDeparturesFromAirport(data, icao) {
  const pilots = (data.clients && data.clients.pilots) || [];
  const upIcao = icao.toUpperCase();
  return pilots.filter(p => p.flightPlan && p.flightPlan.departureId.toUpperCase() === upIcao);
}

function parseFlightLevel(rawLevel) {
  if (!rawLevel) return null;
  const m = String(rawLevel).match(/\d+/);
  return m ? parseInt(m[0], 10) : null;
}

function validateRouteAndSID(dep, route, dest, fl) {
  const apt = SRD_DATA[dep.toUpperCase()];
  if (!apt) return { ok: true, msg: "SRD check skipped (No data)" };

  const routeUpper = route.toUpperCase();
  const firstPtMatch = routeUpper.match(/(?:DCT\s+)?([A-Z0-9]{3,5})/);
  const firstPt = firstPtMatch ? firstPtMatch[1] : null;

  if (!firstPt) return { ok: false, msg: "Route syntax error (no first waypoint)" };

  const sid = apt.sids.find(s => s.point.toUpperCase() === firstPt);
  if (!sid) return { ok: false, msg: "Invalid SID/Point: " + firstPt };

  const constraint = sid.constraints[0];
  const destMatch = constraint.dests.some(d => dest.toUpperCase().startsWith(d));
  if (constraint.dests.length > 0 && !destMatch) return { ok: false, msg: "Destination not valid for " + firstPt };

  if (fl != null) {
    if (fl < constraint.min || fl > constraint.max) return { ok: false, msg: "FL outside limits (FL" + constraint.min + "-FL" + constraint.max + ")" };
    const isOdd = (Math.floor(fl / 10) % 2) === 1;
    if (constraint.dir === "ODD" && !isOdd) return { ok: false, msg: "Wrong parity: should be ODD" };
    if (constraint.dir === "EVEN" && isOdd) return { ok: false, msg: "Wrong parity: should be EVEN" };
  }

  return { ok: true, msg: "All OK" };
}

function isLevelCorrectForTrack(level, trackDeg, useNorthSouth) {
  if (level == null || level < 35 || trackDeg == null || isNaN(trackDeg)) return true;
  const isOdd = (Math.floor(level / 10) % 2) === 1;
  if (useNorthSouth) {
    const oddSector = trackDeg >= 90 && trackDeg <= 269;
    return oddSector ? isOdd : !isOdd;
  } else {
    const eastbound = trackDeg >= 0 && trackDeg <= 179;
    return eastbound ? isOdd : !isOdd;
  }
}

function fillTable(airport, departures, nsRule) {
  const tbody = document.querySelector('#resultsTable tbody');
  departures.forEach(p => {
    const fp = p.flightPlan || {};
    const route = fp.route || "";
    const fl = parseFlightLevel(fp.level);
    const track = p.lastTrack ? p.lastTrack.heading : null;

    const srdResult = validateRouteAndSID(airport, route, fp.arrivalId || "", fl);
    const trackOk = isLevelCorrectForTrack(fl, track, nsRule);

    let statusText = srdResult.msg;
    let statusClass = srdResult.ok ? "green" : "red";
    let explanation = srdResult.msg;

    if (srdResult.ok && !trackOk) {
      statusText = "Wrong FL (track)";
      statusClass = "orange";
      explanation = "Level parity doesn't match track direction.";
    }

    const tr = document.createElement('tr');
    tr.className = statusClass;
    tr.innerHTML = `
      <td>\${escapeHtml(p.callsign || "")}</td>
      <td>\${escapeHtml(fp.departureId || "")}</td>
      <td>\${escapeHtml(fp.arrivalId || "")}</td>
      <td title="\${escapeHtml(route)}">\${escapeHtml(shorten(route, 60))}</td>
      <td>\${fp.level || ""}</td>
      <td>\${track != null ? Math.round(track) + "°" : ""}</td>
      <td>\${statusText}</td>
    `;
    if (statusClass !== "green") {
      tr.style.cursor = "pointer";
      tr.onclick = () => showHint(p.callsign, statusText, explanation);
    }
    tbody.appendChild(tr);
  });
}

function showHint(callsign, title, details) {
  document.getElementById('hintTitle').textContent = callsign + " - " + title;
  document.getElementById('hintMain').textContent = title;
  document.getElementById('hintDetails').textContent = details;
  document.getElementById('hintOverlay').style.display = "flex";
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));
}

function shorten(str, max) {
  str = String(str);
  return str.length <= max ? str : str.slice(0, max - 3) + "...";
}
</script>
</body>
</html>
